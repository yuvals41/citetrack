services:
  postgres:
    image: postgres:17-alpine
    container_name: citetrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: citetrack
      POSTGRES_PASSWORD: citetrack
      POSTGRES_DB: citetrack
    ports:
      # 5433 to avoid colliding with any other local Postgres instance (Multica, Solara, etc.)
      - "127.0.0.1:5433:5432"
    volumes:
      - citetrack-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citetrack -d citetrack"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.dev
    container_name: citetrack-api
    restart: unless-stopped
    working_dir: /home/yuval/Documents/solaraai/citetrack/apps/api
    command:
      - sh
      - -c
      - |
        set -e
        uv sync --all-packages --frozen
        if [ ! -f /home/yuval/Documents/solaraai/citetrack/prisma/client-python/prisma/client.py ]; then
          echo "ERROR: prisma/client-python/prisma/client.py not found." >&2
          echo "Run 'bash prisma/scripts/generatepython.sh' from the citetrack repo on the host first." >&2
          exit 1
        fi
        uv pip install -e /home/yuval/Documents/solaraai/citetrack/prisma/client-python
        exec uv run uvicorn ai_visibility.api.routes:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../apps/api/.env
    environment:
      DATABASE_URL: postgresql://citetrack:citetrack@postgres:5432/citetrack
      DIRECT_URL: postgresql://citetrack:citetrack@postgres:5432/citetrack
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      UV_PROJECT_ENVIRONMENT: /opt/citetrack-venv
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - /home/yuval/Documents/solaraai:/home/yuval/Documents/solaraai
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/api/v1/health\").read()' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  web:
    profiles: ["web"]
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: citetrack-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3003:8080"

volumes:
  citetrack-postgres-data:
    name: citetrack-postgres-data
